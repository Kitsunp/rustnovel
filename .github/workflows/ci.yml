name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff
      - run: ruff format --check .
      - run: ruff check .
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Catch build-script/backend regressions early, especially rfd on Linux.
      - name: Cargo check
        run: cargo check --workspace --all-targets --locked
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # RUSTSEC-2024-0436 is transitive through the graphics stack (`pixels` -> `wgpu` -> `metal`).
      # Keep it isolated here until we can refresh that stack without widening the scope of this CI pass.
      - run: cargo audit -D warnings --ignore RUSTSEC-2024-0436

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets --locked --verbose
      - run: cargo build -p vnengine_py --profile python --locked --verbose
      - run: cargo bench -p visual_novel_engine --bench core_benches --locked -- --warm-up-time 0.1 --measurement-time 0.1 --sample-size 10

  matrix-smoke:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check --workspace --all-targets --locked
      - run: cargo test -p visual_novel_engine --locked --verbose
      - run: cargo test -p vnengine_runtime --locked --verbose

  reproducible-smoke:
    runs-on: ubuntu-latest
    needs: lint
    env:
      SOURCE_DATE_EPOCH: "1704067200"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release artifact twice and compare hash
        shell: bash
        run: |
          set -euo pipefail
          cargo clean -p visual_novel_engine
          cargo build -p visual_novel_engine --release
          first=$(ls target/release/deps/libvisual_novel_engine-*.rlib | head -n1)
          cp "$first" /tmp/vn_first.rlib

          cargo clean -p visual_novel_engine
          cargo build -p visual_novel_engine --release
          second=$(ls target/release/deps/libvisual_novel_engine-*.rlib | head -n1)
          cp "$second" /tmp/vn_second.rlib

          sha256sum /tmp/vn_first.rlib /tmp/vn_second.rlib
          cmp --silent /tmp/vn_first.rlib /tmp/vn_second.rlib

  sbom-policy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all --override-filename sbom.cdx
      - name: Validate SBOM content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          files = sorted(Path(".").rglob("sbom.cdx.json"))
          if not files:
              raise SystemExit("SBOM files not found (expected at least one sbom.cdx.json)")

          total_components = 0
          for file in files:
              payload = json.loads(file.read_text(encoding="utf-8"))
              if payload.get("bomFormat") != "CycloneDX":
                  raise SystemExit(f"{file}: bomFormat is not CycloneDX")
              components = payload.get("components", [])
              if not components:
                  raise SystemExit(f"{file}: SBOM does not contain components")
              total_components += len(components)

          print(f"SBOM files: {len(files)}")
          print(f"SBOM total components: {total_components}")
          PY

  fuzz-smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p visual_novel_engine --features arbitrary --test fuzz_tests --locked --verbose

  python-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Python build artifacts
        run: |
          python3 -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR")); print(sysconfig.get_config_var("LDLIBRARY"))'
          python3 -c 'import sysconfig, pathlib; libdir=sysconfig.get_config_var("LIBDIR"); lib=sysconfig.get_config_var("LDLIBRARY"); path=pathlib.Path(libdir)/lib; print(path); assert path.exists(), f"missing {path}"'
      - name: Set Python environment for PyO3
        run: |
          echo "PYO3_PYTHON=$(which python3)" >> $GITHUB_ENV
          libdir=$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')
          echo "LD_LIBRARY_PATH=${libdir}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> $GITHUB_ENV
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install maturin in venv
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin
      - name: Build and install Python module
        run: |
          source .venv/bin/activate
          maturin develop --manifest-path crates/py/Cargo.toml
      - name: Run Python tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=python python -m unittest tests.python.test_examples tests.python.test_vnengine -v
